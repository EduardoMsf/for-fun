name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:

jobs:
  sonar:
    name: Test & Sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run tests with coverage
        run: npm run test -- --coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to Vercel
    needs: sonar
    runs-on: ubuntu-latest
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4 # Recomendado añadir setup-node aquí también
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: 'postgresql://johndoe:randompassword@localhost:5432/mydb?schema=public'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull, Build & Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CI: true
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Desplegando a PRODUCCIÓN"
            vercel pull --yes --environment=production --token=$VERCEL_TOKEN
            vercel build --prod --yes --token=$VERCEL_TOKEN
            vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          else
            echo "Desplegando a PREVIEW (Develop)"
            vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
            vercel build --yes --token=$VERCEL_TOKEN
            vercel deploy --prebuilt --token=$VERCEL_TOKEN
          fi
